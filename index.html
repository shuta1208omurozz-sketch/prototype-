<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Scanner + Camera Ultimate</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-cyan">
<div id="app">
  <div class="hdr">
    <div class="hdr-title">SCANNER + CAMERA</div>
    <div id="hdr-count" class="hdr-count">0 BC / 0 📷</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="camera">📷 カメラ</div>
    <div class="tab" data-tab="scan">▶ スキャン</div>
    <div class="tab" data-tab="photos">🖼 写真</div>
    <div class="tab" data-tab="history">≡ 履歴</div>
  </div>

  <div class="page on" id="pg-camera">
    <div class="vf-container">
      <video id="cam-video" muted playsinline autoplay></video>
    </div>
    <div class="cam-controls">
      <div class="ctrl-row">
        <div class="ratio-ctrls">
          <button class="ratio-btn" data-ratio="4/3">4:3</button>
          <button class="ratio-btn on" data-ratio="16/9">16:9</button>
          <button class="ratio-btn" data-ratio="21/9">21:9</button>
        </div>
      </div>
      <button id="btn-shutter" class="btn-shutter"></button>
    </div>
  </div>

  <div class="page" id="pg-scan">
    <div id="scan-area">スキャン待機中...</div>
    <div class="scan-btn-wrap">
      <button id="btn-start-scan">スキャン開始</button>
    </div>
  </div>

  <div class="page" id="pg-photos"><div id="photo-grid" class="grid"></div></div>
  <div class="page" id="pg-history"><div id="bc-list"></div></div>

  <div id="toast" class="toast"></div>
</div>

<div id="lightbox" class="lb" style="display:none">
  <img id="lb-img">
  <div id="lb-close">CLOSE</div>
</div>

<script src="main.js"></script>
</body>
</html>
